$kind: http-request
name: 05 - Get profile without token
url: "{{base_url}}/api/users/{{user_id}}"
method: GET
scripts:
  - type: afterResponse
    code: "pm.test(\"Estado HTTP 401\", function () {\r

      \  pm.response.to.have.status(401);\r

      });\r

      \r

      pm.test(\"Rechaza la solicitud sin token\", function () {\r

      \  const json = pm.response.json();\r

      \r

      \  pm.expect(json.error.message).to.eql(\r

      \    \"No autorizado\"\r

      \  );\r

      \r

      \  pm.expect(json.error.details).to.include(\r

      \    \"Authorization\"\r

      \  );\r

      });"
    language: text/javascript
order: 4493399795931471
