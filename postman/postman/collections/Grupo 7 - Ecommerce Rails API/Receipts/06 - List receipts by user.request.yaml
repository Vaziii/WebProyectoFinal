$kind: http-request
name: 06 - List receipts by user
url: "{{base_url}}/api/receipts/user/{{user_id}}"
method: GET
auth:
  type: bearer
  credentials:
    token: "{{token}}"
scripts:
  - type: afterResponse
    code: "pm.test(\"Estado HTTP 200\", function () {\r

      \  pm.response.to.have.status(200);\r

      });\r

      \r

      pm.test(\"Devuelve los recibos del usuario indicado\", function () {\r

      \  const json = pm.response.json();\r

      \r

      \  const userId = Number(\r

      \    pm.collectionVariables.get(\"user_id\")\r

      \  );\r

      \r

      \  pm.expect(json.data).to.be.an(\"array\");\r

      \r

      \  json.data.forEach(function (receipt) {\r

      \    pm.expect(receipt.userId).to.eql(userId);\r

      \  });\r

      });\r

      \r

      pm.test(\"Contiene el recibo creado\", function () {\r

      \  const json = pm.response.json();\r

      \r

      \  const receiptId = Number(\r

      \    pm.collectionVariables.get(\"receipt_id\")\r

      \  );\r

      \r

      \  const receiptIds = json.data.map(function (receipt) {\r

      \    return receipt.receiptId;\r

      \  });\r

      \r

      \  pm.expect(receiptIds).to.include(receiptId);\r

      });"
    language: text/javascript
order: 4485771466847789
